<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2466"/>
      <stop offset="1" stop-color="#14102b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#9b5de5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9b5de5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Test tube, matching the in-game glass exactly (see Bottle.module.css):
       width:height ~1:3.17 (capacity-4 tube), border-radius 14% 14% 26% 26% (so the corners are
       tall ellipses: gentle tapered shoulders up top, deep rounded U-base), and an open mouth
       (border-top: none). W=120, H=380, body x 196..316, y 66..446. Liquid is clipped to the body
       so it tapers into the U-base, with four wavy capacity-4 bands. -->
  <clipPath id="body">
    <path d="M212.8 66 L299.2 66 A16.8 53.2 0 0 1 316 119.2 L316 347.2
             A31.2 98.8 0 0 1 284.8 446 L227.2 446 A31.2 98.8 0 0 1 196 347.2
             L196 119.2 A16.8 53.2 0 0 1 212.8 66 Z"/>
  </clipPath>

  <!-- Empty headspace gets a faint glass tint. -->
  <path d="M212.8 66 L299.2 66 A16.8 53.2 0 0 1 316 119.2 L316 347.2
           A31.2 98.8 0 0 1 284.8 446 L227.2 446 A31.2 98.8 0 0 1 196 347.2
           L196 119.2 A16.8 53.2 0 0 1 212.8 66 Z" fill="url(#glass)"/>

  <g clip-path="url(#body)">
    <!-- Liquid bands, drawn base-up. Each upper band carries a wavy bottom edge that overlaps the
         band below, so neighbouring colors interlock along the wave (as in LiquidSegment). The top
         band (red) also has a wavy open surface. -->
    <!-- blue (base): straight top is covered by green's wavy bottom; base rounds into the U via the clip. -->
    <rect x="192" y="364" width="136" height="96" fill="#3a7bd5"/>
    <!-- green -->
    <path fill="#21bf73" d="M192 287 L320 287 L320 370 L316 370
      C306 364 296 364 286 370 C276 376 266 376 256 370
      C246 364 236 364 226 370 C216 376 206 376 196 370 L192 370 Z"/>
    <!-- orange -->
    <path fill="#f5a623" d="M192 211 L320 211 L320 293 L316 293
      C306 287 296 287 286 293 C276 299 266 299 256 293
      C246 287 236 287 226 293 C216 299 206 299 196 293 L192 293 Z"/>
    <!-- red (top): wavy open surface above, wavy interface below. -->
    <path fill="#e23d54" d="M192 140 L196 140
      C206 134 216 134 226 140 C236 146 246 146 256 140
      C266 134 276 134 286 140 C296 146 306 146 316 140 L320 140
      L320 217 L316 217 C306 211 296 211 286 217 C276 223 266 223 256 217
      C246 211 236 211 226 217 C216 223 206 223 196 217 L192 217 Z"/>

    <!-- Surface sheen along the red liquid line. -->
    <path fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3.5" stroke-linecap="round"
      d="M196 140 C206 134 216 134 226 140 C236 146 246 146 256 140
         C266 134 276 134 286 140 C296 146 306 146 316 140"/>

    <!-- Glossy highlight stripe (.glass::after): left 14%, width 14%, top 8%, height 80%, pill-rounded. -->
    <rect x="213" y="96" width="16" height="280" rx="8" fill="url(#stripe)"/>
  </g>

  <!-- Glass walls + base outline. Open at the top (border-top: none): the stroke runs from the
       top-right shoulder, around the U-base, up to the top-left shoulder, leaving the mouth open. -->
  <path d="M299.2 66 A16.8 53.2 0 0 1 316 119.2 L316 347.2
           A31.2 98.8 0 0 1 284.8 446 L227.2 446 A31.2 98.8 0 0 1 196 347.2
           L196 119.2 A16.8 53.2 0 0 1 212.8 66"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="7.2" stroke-linecap="round"/>
</svg>
