name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

# Run the (Node 20) first-party actions on Node 24, silencing the deprecation notice
# and matching the runner default coming mid-2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # One path for both installing Playwright's browser and the gate's Chromium probe / config lookup,
  # so the e2e step in `npm run check` runs here too (same gate as CI — test parity before publish).
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      # Rust toolchain for the core crate's gate (clippy/fmt/tests), cached across runs.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      # Chromium (cached) for the Playwright step, so the deploy gate runs the e2e smokes too —
      # we push directly to main often, so main gets the FULL gate before publishing (parity w/ CI).
      - uses: ./.github/actions/setup-playwright
        with:
          browsers-path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
      # One gate for both sides: JS lint/typecheck/tests(+coverage) + Rust fmt/clippy/tests + e2e.
      - run: npm run check
      # Keep the Playwright report + traces if the gate fails, so a runner-only e2e failure is
      # debuggable rather than a one-line error.
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
      # Build the production dist/ we publish. This is explicit (not a side effect of the gate's e2e
      # step) so the deploy never depends on whether e2e ran: the gate's Playwright webServer only
      # builds when the e2e step actually runs, and that step SKIPS itself when no Chromium is found
      # (scripts/gate.ts) — which silently left no dist/ and broke upload-pages-artifact. An explicit
      # build guarantees dist/ exists regardless. `npm run check` above still gates the publish.
      - run: npm run build
      - uses: actions/configure-pages@v6
        # Turn Pages on (and set the source to Actions) automatically on first run,
        # so no manual Settings → Pages toggle is needed.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
