name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

# Run the (Node 20) first-party actions on Node 24, silencing the deprecation notice
# and matching the runner default coming mid-2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # One path for both installing Playwright's browser and the gate's Chromium probe / config lookup,
  # so the e2e step in `npm run check` runs here too (same gate as CI — test parity before publish).
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Rust toolchain for the core crate's gate (clippy/fmt/tests), cached across runs.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      # Browser for the Playwright step, so the deploy gate runs the e2e smokes too (parity w/ CI).
      - run: npx playwright install --with-deps chromium
      # One gate for both sides: JS lint/typecheck/tests(+coverage) + Rust fmt/clippy/tests + e2e.
      - run: npm run check
      - run: npm run build
      - uses: actions/configure-pages@v5
        # Turn Pages on (and set the source to Actions) automatically on first run,
        # so no manual Settings → Pages toggle is needed.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
